<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<nav class="navbar navbar-expand-lg navbar-dark forum-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">IU Forum</a>

        <div class="d-flex gap-2">
            <button id="themeToggle"
                    type="button"
                    class="btn btn-outline-light btn-sm theme-toggle-btn">
                Dark
            </button>

            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/login" class="btn btn-primary btn-sm">Login</a>
        </div>
    </div>
</nav>

<main class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo">IU</div>
            <h2>Verify Your Email</h2>
            <p class="text-muted mb-0">
                We sent a 6-digit OTP code to your email.
            </p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
            Error message
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}">
            Success message
        </div>

        <form th:action="@{/verify-otp}" method="post">
            <input type="hidden" name="email" th:value="${email}">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       th:value="${email}"
                       readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">OTP Code</label>
                <input type="text"
                       name="otpCode"
                       class="form-control"
                       placeholder="Enter 6-digit OTP"
                       maxlength="6"
                       required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Verify Account
            </button>
        </form>

        <form th:action="@{/resend-otp}" method="post" class="mt-3">
            <input type="hidden" name="email" th:value="${email}">

            <button type="submit" class="btn btn-outline-primary w-100">
                Resend OTP
            </button>
        </form>

        <div class="auth-footer">
            <p class="mb-0">
                Already verified?
                <a href="/login">Login here</a>
            </p>
        </div>
    </div>
</main>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
