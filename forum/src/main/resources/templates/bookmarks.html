<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">My Bookmarks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark forum-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">IU Forum</a>

        <div class="d-flex align-items-center gap-2">
            <button id="themeToggle"
                    type="button"
                    class="btn btn-outline-light btn-sm theme-toggle-btn">
                Dark
            </button>

            <span class="navbar-text text-light small">
                Hello, <strong sec:authentication="name">user</strong>
            </span>

            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/posts/new" class="btn btn-primary btn-sm">New Post</a>
            <a href="/notifications" class="btn btn-outline-light btn-sm">Notifications</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<section class="category-header">
    <div class="container">
        <h1>My Bookmarks</h1>
        <p>Posts you saved for later.</p>
    </div>
</section>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div th:if="${#lists.isEmpty(bookmarks)}" class="forum-card">
                <p class="mb-0 text-muted">You have not bookmarked any posts yet.</p>
            </div>

            <div class="forum-card post-list-card" th:each="bookmark : ${bookmarks}">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge category-badge"
                          th:text="${bookmark.post.category.name}"
                          th:style="'background-color:' + ${bookmark.post.category.color}">
                        Category
                    </span>

                    <small class="text-muted"
                           th:text="'Saved on ' + ${#temporals.format(bookmark.createdAt, 'dd MMM yyyy HH:mm')}">
                        Saved date
                    </small>
                </div>

                <a th:href="@{/posts/{id}(id=${bookmark.post.id})}" class="post-title">
                    <h5 class="mt-3 mb-2" th:text="${bookmark.post.title}">
                        Post title
                    </h5>
                </a>

                <p class="text-muted" th:text="${bookmark.post.shortContent}">
                    Post preview
                </p>

                <div class="forum-meta">
                    <a th:href="@{/profile/{username}(username=${bookmark.post.author.username})}"
                       class="meta-link"
                       th:text="'Author: ' + ${bookmark.post.author.username}">
                        author
                    </a>

                    <span th:text="'Comments: ' + ${bookmark.post.commentCount}">comments</span>
                    <span th:text="'Likes: ' + ${bookmark.post.likeCount}">likes</span>
                    <span th:text="'Saves: ' + ${bookmark.post.bookmarkCount}">saves</span>
                    <span th:text="'Views: ' + ${bookmark.post.viewCount}">views</span>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="footer mt-5">
    <div class="container text-center">
        <p>© 2026 IU Forum. International University.</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
