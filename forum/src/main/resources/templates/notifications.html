<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Notifications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark forum-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">IU Forum</a>

        <div class="d-flex align-items-center gap-2">
            <button id="themeToggle"
                    type="button"
                    class="btn btn-outline-light btn-sm theme-toggle-btn">
                Dark
            </button>

            <span class="navbar-text text-light small">
                Hello, <strong sec:authentication="name">user</strong>
            </span>

            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/bookmarks" class="btn btn-outline-light btn-sm">Bookmarks</a>
            <a href="/logout" class="btn btn-primary btn-sm">Logout</a>
        </div>
    </div>
</nav>

<section class="category-header">
    <div class="container">
        <h1>Notifications</h1>
        <p th:text="'Unread notifications: ' + ${unreadCount}">
            Unread notifications: 0
        </p>
    </div>
</section>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">My Notifications</h3>

                <form action="/notifications/read-all" method="post">
                    <button type="submit" class="btn btn-primary btn-sm">
                        Mark All As Read
                    </button>
                </form>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" class="forum-card">
                <p class="mb-0 text-muted">You have no notifications.</p>
            </div>

            <div class="forum-card notification-card"
                 th:each="notification : ${notifications}"
                 th:classappend="${notification.read} ? ' notification-read' : ' notification-unread'">

                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div>
                        <h5 th:text="${notification.message}">
                            Notification message
                        </h5>

                        <p class="text-muted mb-2"
                           th:text="${#temporals.format(notification.createdAt, 'dd MMM yyyy HH:mm')}">
                            date
                        </p>

                        <a th:if="${notification.post != null}"
                           th:href="@{/posts/{id}(id=${notification.post.id})}"
                           class="btn btn-outline-primary btn-sm">
                            View Post
                        </a>
                    </div>

                    <form th:if="${!notification.read}"
                          th:action="@{/notifications/read/{id}(id=${notification.id})}"
                          method="post">
                        <button type="submit" class="btn btn-sm btn-success">
                            Mark Read
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="footer mt-5">
    <div class="container text-center">
        <p>© 2026 IU Forum. International University.</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
