<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Edit Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark forum-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">IU Forum</a>

        <div class="d-flex align-items-center gap-2">
            <button id="themeToggle"
                    type="button"
                    class="btn btn-outline-light btn-sm theme-toggle-btn">
                Dark
            </button>

            <span class="navbar-text text-light small" sec:authorize="isAuthenticated()">
                Hello, <strong sec:authentication="name">user</strong>
            </span>

            <a href="/" class="btn btn-outline-light btn-sm">Home</a>

            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-light btn-sm">
                Back to Post
            </a>

            <a href="/bookmarks"
               class="btn btn-outline-light btn-sm"
               sec:authorize="isAuthenticated()">
                Bookmarks
            </a>

            <a href="/notifications"
               class="btn btn-outline-light btn-sm"
               sec:authorize="isAuthenticated()">
                Notifications
            </a>

            <a href="/logout"
               class="btn btn-primary btn-sm"
               sec:authorize="isAuthenticated()">
                Logout
            </a>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="form-card">
                <h2>Edit Post</h2>

                <p class="text-muted">
                    Update your post title, category, or content.
                </p>

                <form th:action="@{/posts/edit/{id}(id=${post.id})}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Post Title</label>
                        <input type="text"
                               name="title"
                               class="form-control"
                               th:value="${post.title}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="categoryId" class="form-select" required>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${category.id == post.category.id}">
                                Category
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="content"
                                  class="form-control"
                                  rows="10"
                                  required
                                  th:text="${post.content}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
    
                        <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</main>

<footer class="footer mt-5">
    <div class="container text-center">
        <p>© 2026 IU Forum. International University.</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
